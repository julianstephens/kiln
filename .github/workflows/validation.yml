name: Validation

on:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Install golangci-lint
        run: |
          curl -sSfL https://golangci-lint.run/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.12.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        withl:
          version: 0.11.17

      - name: Validate code
        run: uv sync --dev --package kiln-sdk && make check

      # - name: Run e2e tests
      #   run: make test-e2e

      - name: Check generated Python schema synchronization
        run: |
          uv sync --package kiln-devtools && make generate-python
          git diff --exit-code python/kiln/schemas

      - name: Check generated Go schema synchronization
        run: |
          uv sync --package kiln-devtools && make generate-go
          git diff --exit-code go/schema
